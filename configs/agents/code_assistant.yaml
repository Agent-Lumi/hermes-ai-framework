name: code_assistant
description: A coding assistant for Python and SQL
use_case: "This agent assists with:\n- Writing Python code\n- SQL query optimization\
  \  \n- Code review and debugging\n- Best practices guidance"
version: 1.0.0
provider:
  name: ollama
  model: llama3.2:latest
  server_url: http://192.168.99.113:11434
  temperature: 0.7
capabilities:
- code_generation
- code_review
- sql_optimization
tools:
- python_executor
- sql_analyzer
memory:
  type: conversation
  max_messages: 20
output:
  format: markdown
  streaming: true
system_prompt: You are a helpful coding assistant. Provide clear, concise code examples
  and explanations.
