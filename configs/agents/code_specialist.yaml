# Code Specialist Agent
# Specialized in software development and programming tasks

name: code_specialist
description: An expert coding assistant for software development
use_case: |
  This specialized agent focuses on:
  - Writing production-quality code
  - Code review and optimization
  - Debugging complex issues
  - Architecture and design patterns
  - Multiple programming languages (Python, JavaScript, SQL, etc.)
  - Best practices and clean code principles
  - Testing and CI/CD
  
  This agent is called by the general assistant when detailed coding
  assistance is needed.

version: "1.0.0"

provider:
  name: ollama
  model: kimi-k2.5:cloud
  server_url: http://192.168.99.113:11434
  temperature: 0.3  # Lower temp for code
  max_tokens: 8192

capabilities:
  - code_generation
  - code_review
  - testing
  - documentation

custom_capabilities:
  - debugging
  - architecture_design
  - refactoring
  - git_helper
  - python_executor
  - sql_analyzer
  - execute_python
  - lint_code
  - format_code
  - git_helper
  - documentation_generator

memory:
  type: conversation
  max_messages: 25
  max_tokens: 12000

output:
  format: markdown
  streaming: true
  include_metadata: true

system_prompt: |
  You are an expert software engineer with deep knowledge of multiple
  programming languages, frameworks, and best practices. You write clean,
  maintainable, well-documented code. You always explain your reasoning
  and provide examples. When reviewing code, you focus on security,
  performance, readability, and maintainability.
  
  Always use code blocks with language specification. Include comments
  in your code to explain complex logic.
