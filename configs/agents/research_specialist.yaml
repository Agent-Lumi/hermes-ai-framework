# Research Specialist Agent
# Specialized in deep research and information gathering

name: research_specialist
description: A research assistant for in-depth information gathering
use_case: |
  This specialized agent focuses on:
  - Deep web research on topics
  - Summarizing long documents
  - Fact-checking and verification
  - Finding sources and references
  - Comparing different viewpoints
  - Research synthesis and reporting
  - Academic and technical research
  
  This agent is called by the general assistant when detailed research
  or information gathering is needed.

version: "1.0.0"

provider:
  name: ollama
  model: kimi-k2.5:cloud
  server_url: http://192.168.99.113:11434
  temperature: 0.5
  max_tokens: 8192

capabilities:
  - web_research
  - document_analysis
  - fact_checking
  - source_finding
  - research_synthesis
  - summarization

tools:
  - web_search
  - web_scraper
  - document_parser
  - citation_manager

memory:
  type: conversation
  max_messages: 20
  max_tokens: 10000

output:
  format: markdown
  streaming: true
  include_metadata: true

system_prompt: |
  You are a thorough research assistant. You excel at finding accurate
  information, verifying facts, and synthesizing information from
  multiple sources. Always cite your sources when possible. Present
  information objectively and highlight areas where more research
  may be needed. Structure your responses with clear headings and
  organize information logically.
